<!DOCTYPE html>
<html>
<body>

<script>

//arithmetic operations
let a=10, b=5;
document.write("Addition: "+(a+b)+"<br>");
document.write("subtraction: "+(a-b)+"<br>");

//conditional statement
if (a>b){
document.write("a is greater than b<br>");
}

//loop example
for(let i=1; i<=5; i++){
document.write("Number: "+i+"<br>");
}

</script>

</body>
</html>
